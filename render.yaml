# One-click deploy config for Render (https://render.com).
# Render dashboard → New + → Blueprint → pick this repo → fill the secrets
# marked "sync: false" (password + each account's API key/secret).
services:
  - type: web
    name: aldash
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ALDASH_PASSWORD
        sync: false
      # ---- Account 1 ----
      - key: ALDASH_ACCOUNT_1_NAME
        value: "Main (Live)"
      - key: ALDASH_ACCOUNT_1_PAPER
        value: "false"
      - key: ALDASH_ACCOUNT_1_KEY
        sync: false
      - key: ALDASH_ACCOUNT_1_SECRET
        sync: false
      # ---- Account 2 (cv) removed ----
      # ---- Account 3 ----
      - key: ALDASH_ACCOUNT_3_NAME
        value: "cnv (Paper)"
      - key: ALDASH_ACCOUNT_3_PAPER
        value: "true"
      - key: ALDASH_ACCOUNT_3_KEY
        sync: false
      - key: ALDASH_ACCOUNT_3_SECRET
        sync: false
