# One-click deploy config for Render (https://render.com).
# In the Render dashboard: New + → Blueprint → point at this repo.
# Then add your secrets under the service's Environment tab (see DEPLOY_FASTAPI.md).
services:
  - type: web
    name: aldash
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALDASH_PASSWORD
        sync: false
      - key: ALDASH_ACCOUNT_1_NAME
        sync: false
      - key: ALDASH_ACCOUNT_1_KEY
        sync: false
      - key: ALDASH_ACCOUNT_1_SECRET
        sync: false
      - key: ALDASH_ACCOUNT_1_PAPER
        sync: false
